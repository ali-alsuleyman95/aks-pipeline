name: AKS CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

    # 1. Repository laden
    - uses: actions/checkout@v3

    # 2. Login bei Azure Container Registry
    - name: Login to ACR
      uses: docker/login-action@v2

      with:
        registry: ${{ secrets.ACR_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    # 3. Docker Image bauen und pushen
    - name: Build and Push
      uses: docker/build-push-action@v4

      with:
        context: .
        push: true
        tags: ${{ secrets.ACR_SERVER }}/pipeline-app:latest

    # 4. Kubectl Zugriff konfigurieren
    - name: Set up Kubectl
      uses: azure/k8s-set-context@v3

      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.KUBE_CONFIG }}

    # 5. Deployment ins AKS Cluster
    - name: Deploy to AKS
      run: |
        kubectl apply -f deployment.yaml
        kubectl rollout restart deployment/cicd-app
