apiVersion: apps/v1
kind: Deployment

metadata:
  name: cicd-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: web

  template:
    metadata:
      labels:
        app: web

    spec:
      containers:
      - name: main

        image: acralidevops2026.azurecr.io/pipeline-app:latest

        ports:
        - containerPort: 80

---

apiVersion: v1
kind: Service

metadata:
  name: cicd-service

spec:
  type: LoadBalancer

  ports:
  - port: 80

  selector:
    app: web
